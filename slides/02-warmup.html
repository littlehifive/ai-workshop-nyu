<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Warm-up</title>
<link rel="stylesheet" href="shared/fonts.css">
<link rel="stylesheet" href="shared/anim.css">
<link rel="stylesheet" href="shared/taf.css">
<style>
  .warm-grid {
    margin-top: 56px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 36px;
    flex: 1;
  }
  .warm-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 6px solid var(--gold);
    border-radius: 12px;
    box-shadow: var(--shadow-md);
    padding: 52px 48px;
    display: flex; flex-direction: column; gap: 28px;
  }
  .warm-card .qnum {
    font-size: 76px; font-weight: 900; color: var(--gold);
    line-height: 1; letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }
  .warm-card .qtext {
    font-size: 36px; font-weight: 600; line-height: 1.32; color: var(--navy);
    margin: 0;
  }
  .presenter-note {
    margin-top: 48px;
    font-size: 24px; font-weight: 500; color: var(--ink-muted);
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
  <div class="slide">
    <p class="eyebrow" data-reveal>Before We Start</p>
    <h1 data-reveal>Three questions for the <span class="accent">room</span></h1>

    <div class="warm-grid">
      <div class="warm-card hoverable" data-reveal>
        <span class="qnum">1</span>
        <p class="qtext">Did you use an AI tool this week? For what?</p>
      </div>
      <div class="warm-card hoverable" data-reveal>
        <span class="qnum">2</span>
        <p class="qtext">What is one thing you don&rsquo;t trust about AI?</p>
      </div>
      <div class="warm-card hoverable" data-reveal>
        <span class="qnum">3</span>
        <p class="qtext">What is one task in your research you would gladly hand to a capable assistant?</p>
      </div>
    </div>

    <p class="presenter-note" data-reveal>Collect answers on a whiteboard; revisit at the end.</p>
  </div>
<script src="shared/anim.js"></script>
<script>
/* Deck-shell integration: forward navigation keys and font-ready state to the
   parent shell via postMessage (direct iframe access is blocked under file://). */
(function () {
  if (window.parent === window) return;
  document.addEventListener('keydown', function (e) {
    var nav = ['ArrowRight', 'ArrowLeft', ' ', 'PageDown', 'PageUp', 'Home', 'End', 'Escape'];
    if (nav.indexOf(e.key) !== -1 || /^[1-9]$/.test(e.key) || e.key === 'p' || e.key === 'P') {
      e.preventDefault();
      window.parent.postMessage({ deckKey: e.key }, '*');
    }
  });
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function () { window.parent.postMessage({ deckFontsReady: true }, '*'); });
  } else {
    window.parent.postMessage({ deckFontsReady: true }, '*');
  }
})();
</script>
</body>
</html>
