<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Closing</title>
<link rel="stylesheet" href="shared/fonts.css">
<link rel="stylesheet" href="shared/anim.css">
<link rel="stylesheet" href="shared/taf.css">
<style>
  :root { --muted-on-navy: #9AB3CC; }
  body.dark .slide { justify-content: center; position: relative; padding: 130px 150px; }
  .topbar {
    position: absolute;
    top: 110px; left: 150px;
    display: flex; align-items: center; gap: 22px;
  }
  .topbar .tick { width: 64px; height: 5px; background: var(--gold); border-radius: 3px; }
  .topbar .wordmark {
    font-size: 21px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--white);
  }
  .close-eyebrow {
    font-size: 22px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted-on-navy);
    margin: 0 0 34px;
  }
  .close-title {
    margin: 0;
    font-size: 80px; font-weight: 800; line-height: 1.08; letter-spacing: -0.02em;
    color: var(--white); max-width: 1500px;
  }
  .close-title .accent { color: var(--gold); }
  .hero {
    margin: 0;
    font-size: 52px; font-weight: 700; line-height: 1.32;
    color: var(--white); max-width: 1540px;
  }
  .hero .accent { color: var(--gold); }
  .hero-wrap { margin-top: 52px; }
  .contact {
    margin-top: 72px;
    padding-top: 44px;
    border-top: 1px solid rgba(154,179,204,0.28);
    display: flex; align-items: baseline; gap: 28px; flex-wrap: wrap;
  }
  .contact .label {
    font-size: 21px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted-on-navy);
  }
  .contact a {
    font-size: 30px; font-weight: 700; color: var(--white);
    text-decoration: none; border-bottom: 2px solid var(--gold);
    padding-bottom: 3px; transition: color 0.2s;
  }
  .contact a:hover { color: var(--gold); }
</style>
</head>
<body class="dark">
  <div class="slide">
    <div class="topbar" data-reveal>
      <span class="tick"></span>
      <span class="wordmark">Agentic Workflows Club</span>
    </div>

    <h1 class="close-title" data-reveal="scale">Keep the work. <span class="accent">Keep the judgment.</span></h1>

    <div class="hero-wrap" data-reveal style="--reveal-delay:.55s">
      <p class="hero">Offload the work whenever it helps. Never surrender the judgment: decide, deliberately, <span class="accent">which decisions remain yours</span>.</p>
    </div>

    <div class="contact" data-reveal style="--reveal-delay:1.1s">
      <span class="label">Questions, anytime</span>
      <a href="https://www.linkedin.com/in/zezhenwu/" target="_blank" rel="noopener">linkedin.com/in/zezhenwu</a>
      <a href="mailto:michael@agency.fund">michael@agency.fund</a>
    </div>
  </div>
<script src="shared/anim.js"></script>
<script>
/* Deck-shell integration: forward navigation keys and font-ready state to the
   parent shell via postMessage (direct iframe access is blocked under file://). */
(function () {
  if (window.parent === window) return;
  document.addEventListener('keydown', function (e) {
    var nav = ['ArrowRight', 'ArrowLeft', ' ', 'PageDown', 'PageUp', 'Home', 'End', 'Escape'];
    if (nav.indexOf(e.key) !== -1 || /^[1-9]$/.test(e.key) || e.key === 'p' || e.key === 'P') {
      e.preventDefault();
      window.parent.postMessage({ deckKey: e.key }, '*');
    }
  });
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function () { window.parent.postMessage({ deckFontsReady: true }, '*'); });
  } else {
    window.parent.postMessage({ deckFontsReady: true }, '*');
  }
})();
</script>
</body>
</html>
